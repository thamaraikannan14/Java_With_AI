<!DOCTYPE html>
<html>
<head>
    <title>Admission</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f4f6f9;
            text-align:center;
        }

        h1{
            margin:0;
            padding:15px;
            background:#2c3e50;
            color:white;
        }

        form{
            background:white;
            display:inline-block;
            padding:20px;
            margin-top:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input, select{
            padding:8px;
            margin:5px;
            width:200px;
        }

        button{
            padding:10px 20px;
            background:#27ae60;
            color:white;
            border:none;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h1>Admission Form</h1>

<form>
    Name:<br>
    <input type="text"><br>

    Email:<br>
    <input type="email"><br>

    Course:<br>
    <select>
        <option>B.E</option>
        <option>BSc</option>
        <option>BCom</option>
    </select><br><br>

    <button>Submit</button>
</form>

</body>
</html>
